id: dlink_dgs1510_override
extends: dlink_dgs_series
match:
  sysdescr_contains:
    - "DGS-1510"
overrides:
  capabilities:
    poe.status.read: true
    poe.control.write: true

  mappings:
    poe.status.read:
      method: snmp
      oids:
        admin_enable: "1.3.6.1.2.1.105.1.1.1.3"
        detection_status: "1.3.6.1.2.1.105.1.1.1.6"
        power_consumption: "1.3.6.1.4.1.171.12.24.1.1.3.1.7"

    poe.control.write:
      primary:
        method: snmp
        oid_template: "1.3.6.1.2.1.105.1.1.1.3.1.{port}"
        value_map:
          on: 1
          off: 2
      verify:
        method: snmp
        oid_template: "1.3.6.1.2.1.105.1.1.1.3.1.{port}"
