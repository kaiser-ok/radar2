id: zyxel_gs_series
protocols:
  snmp:
    version: v2c
  ssh:
    enabled: true
    prompt_regex: "[#>]$"
    pager_disable: ""

mappings:
  system.read:
    method: snmp
    oids:
      hostname: "1.3.6.1.2.1.1.5.0"
      description: "1.3.6.1.2.1.1.1.0"
      uptime: "1.3.6.1.2.1.1.3.0"
      objectid: "1.3.6.1.2.1.1.2.0"
      cpu: "1.3.6.1.4.1.890.1.15.3.2.6.1.13"

  interfaces.read:
    primary:
      method: snmp
      table: "1.3.6.1.2.1.2.2.1"
      fields:
        ifIndex: "1"
        ifDescr: "2"
        ifType: "3"
        ifSpeed: "5"
        ifAdminStatus: "7"
        ifOperStatus: "8"
        ifInOctets: "10"
        ifOutOctets: "16"
    fallback:
      method: ssh
      commands:
        interfaces: "show interfaces status"

  port.admin.write:
    primary:
      method: snmp
      oid_template: "1.3.6.1.2.1.2.2.1.7.{ifIndex}"
      value_map:
        up: 1
        down: 2
    fallback:
      method: ssh
      commands:
        down:
          - "interface port-channel {port_name}"
          - "inactive"
        up:
          - "interface port-channel {port_name}"
          - "no inactive"
    verify:
      method: snmp
      oid_template: "1.3.6.1.2.1.2.2.1.7.{ifIndex}"

  mac_table.read:
    primary:
      method: snmp
      table: "1.3.6.1.2.1.17.7.1.2.2.1"
      fields:
        port: "2"
    fallback:
      method: ssh
      commands:
        mac_table: "show mac address-table"

  vlan.read:
    primary:
      method: snmp
      table: "1.3.6.1.2.1.17.7.1.4.3.1"
      fields:
        name: "1"
        egress_ports: "2"

  ssh.cli.write:
    method: ssh
    commands:
      reboot:
        - "reboot"
        - "y"
