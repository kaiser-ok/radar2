id: hp_aruba_generic
protocols:
  snmp:
    version: v2c
  ssh:
    enabled: true
    prompt_regex: "[#>]$"
    pager_disable: "no page"

mappings:
  system.read:
    method: snmp
    oids:
      hostname: "1.3.6.1.2.1.1.5.0"
      description: "1.3.6.1.2.1.1.1.0"
      uptime: "1.3.6.1.2.1.1.3.0"
      objectid: "1.3.6.1.2.1.1.2.0"
      cpu: "1.3.6.1.4.1.11.2.14.11.5.1.9.6.1.0"

  interfaces.read:
    primary:
      method: snmp
      table: "1.3.6.1.2.1.2.2.1"
      fields:
        ifIndex: "1"
        ifDescr: "2"
        ifType: "3"
        ifSpeed: "5"
        ifAdminStatus: "7"
        ifOperStatus: "8"
        ifInOctets: "10"
        ifOutOctets: "16"
    fallback:
      method: ssh
      commands:
        interfaces: "show interfaces brief"

  port.admin.write:
    primary:
      method: snmp
      oid_template: "1.3.6.1.2.1.2.2.1.7.{ifIndex}"
      value_map:
        up: 1
        down: 2
    fallback:
      method: ssh
      commands:
        down:
          - "interface {port_name}"
          - "disable"
        up:
          - "interface {port_name}"
          - "enable"
    verify:
      method: snmp
      oid_template: "1.3.6.1.2.1.2.2.1.7.{ifIndex}"

  mac_table.read:
    primary:
      method: snmp
      table: "1.3.6.1.2.1.17.4.3.1"
      fields:
        mac: "1"
        port: "2"
        status: "3"
    fallback:
      method: ssh
      commands:
        mac_table: "show mac-address"

  poe.status.read:
    method: snmp
    oids:
      admin_enable: "1.3.6.1.2.1.105.1.1.1.3"
      detection_status: "1.3.6.1.2.1.105.1.1.1.6"
      power_consumption: "1.3.6.1.4.1.11.2.14.11.1.9.1.1.1.8"

  poe.control.write:
    primary:
      method: snmp
      oid_template: "1.3.6.1.2.1.105.1.1.1.3.1.{port}"
      value_map:
        on: 1
        off: 2
    fallback:
      method: ssh
      commands:
        on:
          - "interface {port_name}"
          - "power-over-ethernet"
        off:
          - "interface {port_name}"
          - "no power-over-ethernet"
    verify:
      method: snmp
      oid_template: "1.3.6.1.2.1.105.1.1.1.3.1.{port}"

  vlan.read:
    primary:
      method: snmp
      table: "1.3.6.1.2.1.17.7.1.4.3.1"
      fields:
        name: "1"
        egress_ports: "2"
    fallback:
      method: ssh
      commands:
        vlans: "show vlans"

  ssh.cli.write:
    method: ssh
    commands:
      reboot:
        - "boot system"
        - "y"
